name: CI
on:
  push:
    branches:
      - main
    tags: '*'
  pull_request:
jobs:
  test:
    name: ${{ matrix.env_name }} - Julia ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1'
        include:
          - env_name: sequential
            env_file: .github/ci/env_sequential.toml
            julia_threads: 1
            version: '1'
          - env_name: threaded
            env_file: .github/ci/env_threaded.toml
            julia_threads: 4
            version: '1'
          - env_name: distributed-2
            env_file: .github/ci/env_distributed_2.toml
            julia_threads: 1
            version: '1'
          - env_name: distributed-4
            env_file: .github/ci/env_distributed_4.toml
            julia_threads: 1
            version: '1'
          - env_name: distributed-master-only
            env_file: .github/ci/env_distributed_master_only.toml
            julia_threads: 1
            version: '1'
          - env_name: stress
            env_file: .github/ci/env_stress.toml
            julia_threads: 8
            version: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - name: Run tests (${{ matrix.env_name }})
        run: |
          julia --project=. --threads=${{ matrix.julia_threads }} \
            .github/ci/runner.jl ${{ matrix.env_file }}
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v6
        with:
          file: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
